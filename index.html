<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apna Kirana - Premium Store</title>
    <style>
        /* --- CORE THEME & COLORS (Light & Premium) --- */
        :root {
            --bg-light: #fdfaf5;
            --header-bg: #f5eedf;
            --text-dark: #3d2514;
            --text-muted: #5e432f;
            --accent-color: #8b5a2b;
            --btn-hover: #6f4722;
            --white: #ffffff;
            --dark-bag: #322115;
            --border-color: #e5d8c5;
            --shadow-light: 0 4px 10px rgba(61, 37, 20, 0.08);
            --shadow-hover: 0 10px 20px rgba(61, 37, 20, 0.15);
            --transition: all 0.3s ease-in-out;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { background-color: var(--bg-light); color: var(--text-dark); overflow-x: hidden; }

        /* --- HYPER-REALISTIC BOUNCING SPLASH SCREEN --- */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--bg-light); z-index: 99999;
            display: flex; justify-content: center; align-items: center; flex-direction: column;
        }

        .bounce-stage { position: relative; width: 150px; height: 200px; display: flex; justify-content: center; }

        .orb {
            width: 45px; height: 45px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #cd853f, #8b5a2b);
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.3), 0 10px 15px rgba(139,90,43,0.4);
            position: absolute;
            animation: gravityBounce 1.2s cubic-bezier(0.28, 0.84, 0.42, 1) infinite alternate;
        }

        .orb-shadow {
            width: 50px; height: 6px; background: rgba(139,90,43,0.3); border-radius: 50%;
            position: absolute; bottom: 20px; filter: blur(2px);
            animation: shadowShrink 1.2s cubic-bezier(0.28, 0.84, 0.42, 1) infinite alternate;
        }

        .blast-ring {
            position: absolute; bottom: 40px; width: 10px; height: 10px;
            border: 3px solid var(--accent-color); border-radius: 50%; opacity: 0; transform: scale(1);
        }

        .trigger-blast { animation: ringExpand 0.6s ease-out forwards; }
        .trigger-hide { display: none !important; }

        .brand-reveal {
            opacity: 0; transform: translateY(20px) scale(0.9);
            font-size: 2.4rem; font-weight: 800; color: var(--text-dark);
            margin-top: 10px; text-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        
        .brand-reveal span { color: var(--accent-color); }
        .show-brand { animation: popText 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes gravityBounce {
            0% { transform: translateY(-100px) scale(1); }
            100% { transform: translateY(30px) scaleX(1.2) scaleY(0.8); }
        }
        @keyframes shadowShrink { 0% { transform: scale(0.4); opacity: 0.2; } 100% { transform: scale(1.2); opacity: 0.8; } }
        @keyframes ringExpand { 0% { opacity: 1; transform: scale(1); border-width: 5px; } 100% { opacity: 0; transform: scale(25); border-width: 0px; } }
        @keyframes popText { to { opacity: 1; transform: translateY(0) scale(1); } }

        /* --- FIXED TOP HEADER --- */
        header {
            background-color: var(--header-bg);
            border-bottom: 2px solid var(--border-color);
            padding: 12px 40px; position: sticky; top: 0; z-index: 1000;
        }

        .header-content {
            max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center;
        }

        .logo-box { font-size: 1.6rem; font-weight: 800; color: var(--accent-color); display: flex; flex-direction: column; line-height: 1; }
        .logo-box span { font-size: 1.2rem; color: var(--text-dark); }

        .nav-links { font-size: 0.9rem; font-weight: 600; color: var(--text-dark); display: flex; gap: 15px; }
        .nav-links span { cursor: pointer; }
        .nav-links span:hover { color: var(--accent-color); }

        .header-cart { text-align: right; font-size: 0.85rem; font-weight: 600; color: var(--text-dark); cursor: pointer; }
        .header-cart .icon { font-size: 1.4rem; color: var(--accent-color); }

        /* --- HERO BANNER --- */
        .hero {
            background: linear-gradient(rgba(61, 37, 20, 0.7), rgba(61, 37, 20, 0.7)), url('https://images.unsplash.com/photo-1596040033229-a9821ebd058d?auto=format&fit=crop&w=1200&q=80') center/cover;
            color: var(--white); text-align: center; padding: 60px 20px; margin-bottom: 40px;
        }
        .hero h1 { font-size: 2.8rem; font-weight: 700; margin-bottom: 10px; }
        .hero p { font-size: 1rem; font-weight: 400; max-width: 600px; margin: 0 auto; opacity: 0.9; }

        /* --- 4-COLUMN CATALOG GRID --- */
        .catalog-container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .catalog-title { text-align: center; font-size: 2rem; font-weight: 700; color: var(--accent-color); margin-bottom: 30px; }

        .grid-layout {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* STRICTLY 4 ITEMS PER ROW */
            gap: 20px;
        }

        @media (max-width: 992px) { .grid-layout { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 768px) { .grid-layout { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 480px) { .grid-layout { grid-template-columns: 1fr; } }

        .item-card {
            background: var(--white); border: 1px solid var(--border-color);
            border-radius: 6px; box-shadow: var(--shadow-light);
            text-align: center; padding-bottom: 15px; transition: var(--transition);
            display: flex; flex-direction: column; justify-content: space-between;
        }

        .item-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-hover); border-color: var(--accent-color); }

        .item-img { width: 100%; height: 160px; object-fit: cover; border-top-left-radius: 6px; border-top-right-radius: 6px; }

        /* Highlighted Item Name */
        .item-name {
            font-size: 1rem; font-weight: 800; color: var(--text-dark);
            margin: 12px 10px 5px 10px; min-height: 45px;
            display: flex; align-items: center; justify-content: center;
        }

        .item-price { font-size: 1rem; font-weight: 600; color: var(--text-muted); margin-bottom: 12px; }

        .add-btn {
            background: var(--accent-color); color: var(--white);
            border: none; padding: 8px 0; width: 80%; margin: 0 auto;
            font-size: 0.9rem; font-weight: 600; border-radius: 4px; cursor: pointer; transition: var(--transition);
        }
        .add-btn:hover { background: var(--btn-hover); }

        /* --- DARK SHOPPING BAG AREA (MATCHING IMAGE) --- */
        .cart-section { background-color: var(--dark-bag); color: var(--white); padding: 50px 20px; margin-top: 60px; }
        .cart-wrapper { max-width: 800px; margin: 0 auto; }
        .cart-header { text-align: center; font-size: 1.8rem; font-weight: 700; margin-bottom: 30px; }

        .cart-list { border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; }
        
        .cart-row {
            display: grid; grid-template-columns: auto 1fr auto auto; align-items: center; gap: 15px;
            padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 0.95rem;
        }

        .cart-thumb { width: 40px; height: 40px; object-fit: cover; border-radius: 4px; border: 1px solid rgba(255,255,255,0.2); }
        .cart-item-name { color: #e5d8c5; font-weight: 500; }
        .cart-qty { color: #a99889; }
        .cart-price { font-weight: 600; text-align: right; }

        .empty-text { text-align: center; padding: 30px; color: #a99889; font-style: italic; }

        .total-wrapper { display: flex; justify-content: flex-end; margin-top: 20px; font-size: 1.2rem; font-weight: 700; gap: 40px; }
        
        .checkout-btn {
            background-color: var(--accent-color); color: var(--white); border: none;
            padding: 12px 60px; font-size: 1rem; font-weight: 700; border-radius: 4px;
            cursor: pointer; margin-top: 20px; float: right; transition: var(--transition);
        }
        .checkout-btn:hover { background-color: #6f4722; }
        
        .clear-fix { clear: both; }

    </style>
</head>
<body>

<div id="splash-screen">
    <div class="bounce-stage">
        <div class="orb-shadow" id="anim-shadow"></div>
        <div class="orb" id="anim-orb"></div>
        <div class="blast-ring" id="anim-blast"></div>
    </div>
    <div class="brand-reveal" id="anim-text">Apna <span>Kirana</span></div>
</div>

<header>
    <div class="header-content">
        <div class="logo-box">
            Apna <span>Parchoon Store</span>
        </div>
        <div class="nav-links">
            <span>Home</span> | <span>Masale</span> | <span>Dry Ration</span> | <span>Contact</span>
        </div>
        <div class="header-cart" onclick="document.getElementById('shopping-bag').scrollIntoView({behavior: 'smooth'})">
            <div class="icon">🛒 <span id="header-qty">0</span></div>
            <div id="header-price">₹0.00</div>
        </div>
    </div>
</header>

<div class="hero">
    <h1>Welcome to Apna Kirana</h1>
    <p>Pure spices, premium sugar, tea leaves, and daily household groceries delivered fresh.</p>
</div>

<div class="catalog-container">
    <h2 class="catalog-title">Our Premium Items</h2>
    <div class="grid-layout" id="product-grid">
        </div>
</div>

<div class="cart-section" id="shopping-bag">
    <div class="cart-wrapper">
        <h2 class="cart-header">Your Shopping Bag</h2>
        <div class="cart-list" id="cart-items-container">
            <div class="empty-text">Your bag is empty.</div>
        </div>
        <div class="total-wrapper">
            <span>Total:</span>
            <span id="cart-total-price">₹0.00</span>
        </div>
        <button class="checkout-btn" onclick="processCheckoutWithLocation()">Checkout</button>
        <div class="clear-fix"></div>
    </div>
</div>

<script>
    // 34 AUTHENTIC PARCHOON (KIRANA) ITEMS ONLY
    const inventory = [
        { id: 1, name: "Premium Sugar (Chini)", price: 45, img: "https://images.unsplash.com/photo-1590005354167-6da97870c913?auto=format&fit=crop&w=300" },
        { id: 2, name: "Assam Tea Leaves", price: 120, img: "https://images.unsplash.com/photo-1597481499750-3e6b22637e12?auto=format&fit=crop&w=300" },
        { id: 3, name: "Pure Turmeric (Haldi)", price: 60, img: "https://images.unsplash.com/photo-1615486171448-4fd9c40212ab?auto=format&fit=crop&w=300" },
        { id: 4, name: "Red Chili Powder", price: 85, img: "https://images.unsplash.com/photo-1596040033229-a9821ebd058d?auto=format&fit=crop&w=300" },
        { id: 5, name: "Coriander Powder", price: 50, img: "https://images.unsplash.com/photo-1596040033229-a9821ebd058d?auto=format&fit=crop&w=300" },
        { id: 6, name: "Garam Masala Blend", price: 110, img: "https://images.unsplash.com/photo-1596040033229-a9821ebd058d?auto=format&fit=crop&w=300" },
        { id: 7, name: "Cumin Seeds (Jeera)", price: 90, img: "https://images.unsplash.com/photo-1608855490184-a1458e0a1b63?auto=format&fit=crop&w=300" },
        { id: 8, name: "Mustard Seeds (Sarson)", price: 40, img: "https://images.unsplash.com/photo-1608855490184-a1458e0a1b63?auto=format&fit=crop&w=300" },
        { id: 9, name: "Chakki Fresh Atta", price: 350, img: "https://images.unsplash.com/photo-1509440159596-0249088772ff?auto=format&fit=crop&w=300" },
        { id: 10, name: "Basmati Rice", price: 95, img: "https://images.unsplash.com/photo-1591814468924-caf88d1232e1?auto=format&fit=crop&w=300" },
        { id: 11, name: "Toor Dal (Arhar)", price: 150, img: "https://images.unsplash.com/photo-1586201375761-83865001e31c?auto=format&fit=crop&w=300" },
        { id: 12, name: "Moong Dal Yellow", price: 110, img: "https://images.unsplash.com/photo-1586201375761-83865001e31c?auto=format&fit=crop&w=300" },
        { id: 13, name: "Chana Dal", price: 85, img: "https://images.unsplash.com/photo-1544816155-12df9643f363?auto=format&fit=crop&w=300" },
        { id: 14, name: "Urad Dal Black", price: 130, img: "https://images.unsplash.com/photo-1586201375761-83865001e31c?auto=format&fit=crop&w=300" },
        { id: 15, name: "Mustard Oil (1 Ltr)", price: 160, img: "https://images.unsplash.com/photo-1474979266404-7eaacbcd87c5?auto=format&fit=crop&w=300" },
        { id: 16, name: "Refined Sunflower Oil", price: 145, img: "https://images.unsplash.com/photo-1474979266404-7eaacbcd87c5?auto=format&fit=crop&w=300" },
        { id: 17, name: "Pure Desi Ghee", price: 550, img: "https://images.unsplash.com/photo-1528698827591-e19ccd7bc23d?auto=format&fit=crop&w=300" },
        { id: 18, name: "Iodized Salt (1kg)", price: 25, img: "https://images.unsplash.com/photo-1626132647523-66f5bf380027?auto=format&fit=crop&w=300" },
        { id: 19, name: "Black Salt (Kala Namak)", price: 20, img: "https://images.unsplash.com/photo-1626132647523-66f5bf380027?auto=format&fit=crop&w=300" },
        { id: 20, name: "Black Pepper Whole", price: 180, img: "https://images.unsplash.com/photo-1596040033229-a9821ebd058d?auto=format&fit=crop&w=300" },
        { id: 21, name: "Green Cardamom", price: 300, img: "https://images.unsplash.com/photo-1596040033229-a9821ebd058d?auto=format&fit=crop&w=300" },
        { id: 22, name: "Cloves (Laung)", price: 150, img: "https://images.unsplash.com/photo-1596040033229-a9821ebd058d?auto=format&fit=crop&w=300" },
        { id: 23, name: "Cinnamon Sticks", price: 90, img: "https://images.unsplash.com/photo-1596040033229-a9821ebd058d?auto=format&fit=crop&w=300" },
        { id: 24, name: "Bay Leaf (Tej Patta)", price: 40, img: "https://images.unsplash.com/photo-1596040033229-a9821ebd058d?auto=format&fit=crop&w=300" },
        { id: 25, name: "Poha (Thick)", price: 55, img: "https://images.unsplash.com/photo-1591814468924-caf88d1232e1?auto=format&fit=crop&w=300" },
        { id: 26, name: "Suji (Semolina)", price: 45, img: "https://images.unsplash.com/photo-1509440159596-0249088772ff?auto=format&fit=crop&w=300" },
        { id: 27, name: "Maida (Refined Flour)", price: 40, img: "https://images.unsplash.com/photo-1509440159596-0249088772ff?auto=format&fit=crop&w=300" },
        { id: 28, name: "Besan (Gram Flour)", price: 90, img: "https://images.unsplash.com/photo-1509440159596-0249088772ff?auto=format&fit=crop&w=300" },
        { id: 29, name: "Organic Jaggery (Gud)", price: 70, img: "https://images.unsplash.com/photo-1590005354167-6da97870c913?auto=format&fit=crop&w=300" },
        { id: 30, name: "Soya Chunks", price: 65, img: "https://images.unsplash.com/photo-1586201375761-83865001e31c?auto=format&fit=crop&w=300" },
        { id: 31, name: "White Chickpeas", price: 140, img: "https://images.unsplash.com/photo-1544816155-12df9643f363?auto=format&fit=crop&w=300" },
        { id: 32, name: "Black Gram (Chana)", price: 95, img: "https://images.unsplash.com/photo-1544816155-12df9643f363?auto=format&fit=crop&w=300" },
        { id: 33, name: "Raw Peanuts", price: 120, img: "https://images.unsplash.com/photo-1505252585461-04db1eb84625?auto=format&fit=crop&w=300" },
        { id: 34, name: "Premium Cashews", price: 850, img: "https://images.unsplash.com/photo-1505252585461-04db1eb84625?auto=format&fit=crop&w=300" }
    ];

    let cartData = {};

    // --- ANIMATION CONTROLLER ---
    window.addEventListener('DOMContentLoaded', () => {
        const orb = document.getElementById('anim-orb');
        const shadow = document.getElementById('anim-shadow');
        const blast = document.getElementById('anim-blast');
        const text = document.getElementById('anim-text');
        const screen = document.getElementById('splash-screen');

        setTimeout(() => {
            orb.classList.add('trigger-hide');
            shadow.classList.add('trigger-hide');
            blast.classList.add('trigger-blast');
            text.classList.add('show-brand');
            
            setTimeout(() => {
                screen.style.opacity = '0';
                screen.style.transition = 'opacity 0.5s ease';
                setTimeout(() => screen.remove(), 500);
            }, 1200);
        }, 2200);

        renderStoreItems();
    });

    // --- RENDER 4-COLUMN GRID ---
    function renderStoreItems() {
        const grid = document.getElementById('product-grid');
        grid.innerHTML = inventory.map(item => {
            cartData[item.id] = 0; // Set default 0
            return `
                <div class="item-card">
                    <img src="${item.img}" class="item-img" alt="${item.name}">
                    <div class="item-name">${item.name}</div>
                    <div class="item-price">₹${item.price.toFixed(2)}</div>
                    <button class="add-btn" onclick="addToCart(${item.id})">Add to Cart</button>
                </div>
            `;
        }).join('');
    }

    function addToCart(id) {
        cartData[id] += 1;
        updateCartUI();
    }

    // --- UPDATE DARK BAG & HEADER ---
    function updateCartUI() {
        const bagContainer = document.getElementById('cart-items-container');
        let totalItems = 0;
        let totalPrice = 0;
        let htmlList = "";

        inventory.forEach(item => {
            const qty = cartData[item.id];
            if (qty > 0) {
                totalItems += qty;
                const cost = qty * item.price;
                totalPrice += cost;
                
                htmlList += `
                    <div class="cart-row">
                        <img src="${item.img}" class="cart-thumb">
                        <span class="cart-item-name">${item.name} (x${qty})</span>
                        <span class="cart-qty">x${qty}</span>
                        <span class="cart-price">₹${cost.toFixed(2)}</span>
                    </div>
                `;
            }
        });

        // Update Header
        document.getElementById('header-qty').innerText = `${totalItems} items`;
        document.getElementById('header-price').innerText = `₹${totalPrice.toFixed(2)}`;

        // Update Bag
        if(totalItems === 0) {
            bagContainer.innerHTML = `<div class="empty-text">Your bag is empty.</div>`;
            document.getElementById('cart-total-price').innerText = "₹0.00";
        } else {
            bagContainer.innerHTML = htmlList;
            document.getElementById('cart-total-price').innerText = `₹${totalPrice.toFixed(2)}`;
        }
    }

    // --- CHECKOUT WITH LIVE GPS LOCATION ---
    function processCheckoutWithLocation() {
        let hasItems = false;
        let totalVal = 0;
        let orderText = "🛒 *New Kirana Order*\n━━━━━━━━━━━━━━━\n";

        inventory.forEach(item => {
            const qty = cartData[item.id];
            if(qty > 0) {
                hasItems = true;
                const cost = qty * item.price;
                totalVal += cost;
                orderText += `📦 *${item.name}* (x${qty}) = ₹${cost}\n`;
            }
        });

        if(!hasItems) {
            alert("Cart is empty. Please add parchoon items first.");
            return;
        }

        orderText += "━━━━━━━━━━━━━━━\n";
        orderText += `💰 *Grand Total: ₹${totalVal}*\n\n`;

        // Request Browser Location
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const mapUrl = `https://www.google.com/maps?q=${lat},${lng}`;
                    
                    orderText += `📍 *Customer Location:*\n${mapUrl}`;
                    dispatchToWhatsApp(orderText);
                },
                (error) => {
                    alert("Location access denied. Sending order without GPS data.");
                    orderText += `📍 *Location:* Not Provided by Customer.`;
                    dispatchToWhatsApp(orderText);
                }
            );
        } else {
            orderText += `📍 *Location:* Browser does not support GPS.`;
            dispatchToWhatsApp(orderText);
        }
    }

    function dispatchToWhatsApp(finalMessage) {
        const phoneNo = "919876543210"; // Replace with real shop owner number
        const url = `https://api.whatsapp.com/send?phone=${phoneNo}&text=${encodeURIComponent(finalMessage)}`;
        window.open(url, '_blank');
    }
</script>
</body>
</html>
