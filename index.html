<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apna Kirana - Premium Storefront</title>
    <style>
        /* =========================================================
           CORE THEME & COLOR PALETTE
           ========================================================= */
        :root {
            --bg-cream: #fdfaf5;
            --header-bg: #f9f4eb;
            --text-dark: #3d2514;
            --text-muted: #6b4d36;
            --accent-brown: #8b5a2b;
            --accent-hover: #6f4722;
            --white: #ffffff;
            --bag-bg: #2c1a11;
            --border-light: #eaddcb;
            --border-radius: 8px;
            --shadow-sm: 0 4px 12px rgba(61, 37, 20, 0.05);
            --shadow-md: 0 12px 24px rgba(61, 37, 20, 0.12);
            --transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

        body { background-color: var(--bg-cream); color: var(--text-dark); overflow-x: hidden; }

        /* =========================================================
           CINEMATIC 3D EXPLOSION INTRO SPLASH
           ========================================================= */
        #intro-portal {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--bg-cream); z-index: 99999;
            display: flex; justify-content: center; align-items: center; flex-direction: column;
        }

        .stage-3d { position: relative; width: 200px; height: 250px; display: flex; justify-content: center; align-items: center; }

        .bouncing-sphere {
            width: 55px; height: 55px; border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #cd853f, #8b5a2b);
            box-shadow: inset -6px -6px 15px rgba(0,0,0,0.4), 0 15px 25px rgba(139,90,43,0.3);
            position: absolute;
            animation: cinematicBounce 1.5s cubic-bezier(0.45, 0, 0.55, 1) infinite alternate;
        }

        .ground-shadow {
            width: 70px; height: 10px;
            background: radial-gradient(ellipse at center, rgba(61,37,20,0.3) 0%, rgba(0,0,0,0) 70%);
            position: absolute; bottom: 25px; filter: blur(2px);
            animation: shadowDeform 1.5s cubic-bezier(0.45, 0, 0.55, 1) infinite alternate;
        }

        .burst-active { animation: burstDissolve 0.5s forwards cubic-bezier(0.1, 0.8, 0.1, 1) !important; }

        .popped-brand {
            opacity: 0; transform: scale(0.7); font-size: 2.5rem; font-weight: 800;
            color: var(--text-dark); margin-top: 20px; text-align: center;
        }

        .popped-brand span { background: var(--accent-brown); color: var(--white); padding: 4px 12px; border-radius: 6px; margin-left: 6px; }

        @keyframes cinematicBounce {
            0% { transform: translateY(-130px) scaleX(0.95) scaleY(1.05); }
            100% { transform: translateY(55px) scaleX(1.35) scaleY(0.65); }
        }

        @keyframes shadowDeform { 0% { transform: scale(0.3); opacity: 0.1; } 100% { transform: scale(1.4); opacity: 0.7; } }

        @keyframes burstDissolve {
            0% { transform: translateY(55px) scale(1); }
            100% { transform: translateY(55px) scale(10); opacity: 0; filter: blur(5px); }
        }

        /* =========================================================
           RESPONSIVE PRODUCT GRID
           ========================================================= */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Default Mobile */
            gap: 15px; padding: 20px;
        }
        @media (min-width: 1024px) { .products-grid { grid-template-columns: repeat(4, 1fr); gap: 25px; } }

        .product-card {
            background: var(--white); border-radius: var(--border-radius);
            border: 1px solid var(--border-light); padding: 15px; text-align: center;
        }

        .add-btn {
            background: var(--accent-brown); color: var(--white); border: none;
            padding: 10px; width: 100%; border-radius: 4px; cursor: pointer;
        }

        /* =========================================================
           SHOPPING BAG
           ========================================================= */
        .shopping-bag-container {
            background-color: var(--bag-bg); color: var(--white);
            padding: 40px 20px; margin-top: 40px;
        }
        
    </style>
</head>
<body>

<div id="intro-portal">
    <div class="stage-3d">
        <div class="ground-shadow" id="shadow-element"></div>
        <div class="bouncing-sphere" id="sphere-element"></div>
    </div>
    <div class="popped-brand" id="brand-text-element">Apna<span>Kirana</span></div>
</div>

<header>
    <div class="nav-container">
        <h2>Apna Store</h2>
        <div class="cart-status" onclick="document.getElementById('shopping-bag-section').scrollIntoView({behavior: 'smooth'})">
            🛒 <span id="header-qty-count">0</span> Items
        </div>
    </div>
</header>

<div class="products-grid" id="catalog-injector"></div>

<div class="shopping-bag-container" id="shopping-bag-section">
    <div id="bag-injector"></div>
    <button class="add-btn" style="margin-top:20px" onclick="executeCheckoutWithLocation()">Checkout via WhatsApp</button>
</div>

<script>
    const fullInventoryDatabase = [
        { id: 1, name: "Sugar (1kg)", price: 45 }, { id: 2, name: "Tea Leaves (500g)", price: 180 },
        { id: 3, name: "Turmeric (200g)", price: 65 }, { id: 4, name: "Red Chili (200g)", price: 90 },
        { id: 5, name: "Coriander (200g)", price: 55 }, { id: 6, name: "Garam Masala (100g)", price: 120 },
        { id: 7, name: "Cumin Seeds (200g)", price: 140 }, { id: 8, name: "Mustard Seeds (250g)", price: 45 },
        { id: 9, name: "Wheat Atta (5kg)", price: 190 }, { id: 10, name: "Basmati Rice (1kg)", price: 110 },
        { id: 11, name: "Toor Dal (1kg)", price: 165 }, { id: 12, name: "Yellow Moong (1kg)", price: 120 },
        { id: 13, name: "Chana Dal (1kg)", price: 95 }, { id: 14, name: "Black Urad (1kg)", price: 140 },
        { id: 15, name: "Mustard Oil (1L)", price: 155 }, { id: 16, name: "Sunflower Oil (1L)", price: 135 },
        { id: 17, name: "Cow Ghee (500ml)", price: 350 }, { id: 18, name: "Iodized Salt (1kg)", price: 28 },
        { id: 19, name: "Rock Salt (500g)", price: 40 }, { id: 20, name: "Black Pepper (50g)", price: 95 },
        { id: 21, name: "Cardamom (50g)", price: 180 }, { id: 22, name: "Cloves (50g)", price: 75 },
        { id: 23, name: "Cinnamon (50g)", price: 45 }, { id: 24, name: "Bay Leaf (50g)", price: 30 },
        { id: 25, name: "Thick Poha (500g)", price: 45 }, { id: 26, name: "Roasted Suji (500g)", price: 35 },
        { id: 27, name: "Fine Maida (500g)", price: 30 }, { id: 28, name: "Besan (500g)", price: 65 },
        { id: 29, name: "Organic Jaggery (1kg)", price: 85 }, { id: 30, name: "Soya Chunks (200g)", price: 55 },
        { id: 31, name: "Kabuli Chana (1kg)", price: 155 }, { id: 32, name: "Kala Chana (1kg)", price: 105 },
        { id: 33, name: "Raw Peanuts (500g)", price: 80 }, { id: 34, name: "Cashew Nuts (250g)", price: 280 }
    ];

    let userCartMatrix = {};

    // Initial Setup
    window.addEventListener('DOMContentLoaded', () => {
        // Animation
        setTimeout(() => {
            document.getElementById('sphere-element').classList.add('burst-active');
            document.getElementById('brand-text-element').style.opacity = 1;
            setTimeout(() => document.getElementById('intro-portal').remove(), 1000);
        }, 2000);

        buildProductGrid();
    });

    function buildProductGrid() {
        const grid = document.getElementById('catalog-injector');
        grid.innerHTML = fullInventoryDatabase.map(p => {
            userCartMatrix[p.id] = 0;
            return `
                <div class="product-card">
                    <p style="font-weight:bold; margin-bottom:10px">${p.name}</p>
                    <p>₹${p.price}</p>
                    <button class="add-btn" onclick="add(${p.id})">Add</button>
                </div>
            `;
        }).join('');
    }

    function add(id) {
        userCartMatrix[id]++;
        renderBag();
    }

    function renderBag() {
        const bag = document.getElementById('bag-injector');
        let html = "<h3>Your Bag</h3>";
        fullInventoryDatabase.forEach(p => {
            if(userCartMatrix[p.id] > 0) html += `<p>${p.name} x ${userCartMatrix[p.id]}</p>`;
        });
        bag.innerHTML = html;
        document.getElementById('header-qty-count').innerText = Object.values(userCartMatrix).reduce((a,b)=>a+b, 0);
    }

    function executeCheckoutWithLocation() {
        navigator.geolocation.getCurrentPosition(pos => {
            const msg = `Order: ${JSON.stringify(userCartMatrix)} | Loc: ${pos.coords.latitude},${pos.coords.longitude}`;
            window.open(`https://wa.me/919876543210?text=${encodeURIComponent(msg)}`);
        });
    }
</script>
</body>
</html>
